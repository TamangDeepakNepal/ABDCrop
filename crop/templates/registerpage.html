<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Registration | CropSense</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    linear-gradient(rgba(18,63,28,.45),rgba(18,63,28,.45)),
    url("https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&w=1920&q=80");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:40px;
}

.container{
    width:100%;
    max-width:920px;
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(12px);
    border-radius:22px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.3);
}

.container h2{
    grid-column:1/-1;
    text-align:center;
    color:#2e7d32;
    font-size:30px;
    margin-bottom:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
}

.icon{
    color:#2e7d32;
}

form{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:22px;
    margin-top:30px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.full{
    grid-column:1/-1;
}

label{
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

input,
select{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:15px;
    transition:.3s;
    background:#fff;
}

input:focus,
select:focus{
    outline:none;
    border-color:#2e7d32;
    box-shadow:0 0 0 4px rgba(46,125,50,.18);
    transform:translateY(-2px);
}

button{
    grid-column:1/-1;
    padding:15px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:12px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1b5e20;
    transform:translateY(-2px);
}

button i{
    margin-right:8px;
}

.login-link{
    grid-column:1/-1;
    text-align:center;
    margin-top:18px;
    color:#555;
    font-size:15px;
}

.login-link a{
    color:#2e7d32;
    text-decoration:none;
    font-weight:600;
}

.login-link a:hover{
    text-decoration:underline;
}

@media(max-width:768px){

.container{
    padding:30px 22px;
}

form{
    grid-template-columns:1fr;
    gap:18px;
}

.full{
    grid-column:auto;
}

.container h2{
    font-size:25px;
}

}
</style>

</head>
<body>

<div class="container">

<h2>
<i class="fas fa-tractor icon"></i>
Farmer Registration
</h2>

<form action="/register" method="POST">

<div class="input-group">
<label>Full Name</label>
<input type="text" name="fullname" placeholder="Enter your full name" required>
</div>

<div class="input-group">
<label>Username</label>
<input type="text" name="username" placeholder="Choose a username" required>
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" name="email" placeholder="you@example.com" required>
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="tel" name="phone" placeholder="+977-98XXXXXXXX" required>
</div>

<div class="input-group">
<label>District</label>
<input type="text" name="district" placeholder="e.g. Chitwan" required>
</div>

<div class="input-group">
<label>Municipality</label>
<input type="text" name="municipality" placeholder="e.g. Bharatpur" required>
</div>

<div class="input-group">
<label>Ward No.</label>
<input type="number" name="ward" min="1" placeholder="1-32" required>
</div>

<div class="input-group">
<label>Farm Size (Acres)</label>
<input type="number" step="0.01" name="farm_size" placeholder="e.g. 2.5" required>
</div>

<div class="input-group full">
<label>Password</label>
<input type="password" name="password" placeholder="Create a strong password" required>
</div>

<div class="input-group full">
<label>Confirm Password</label>
<input type="password" name="confirm_password" placeholder="Re-enter password" required>
</div>

<button type="submit">
<i class="fas fa-user-plus"></i>
Register Now
</button>

<div class="login-link">
Already have an account?
<a href="/login">Log In</a>
</div>

</form>

</div>

</body>
</html>
